name: Generate Cat POP

on:
  workflow_dispatch:
    inputs:
      template_id:
        description: 'Template ID'
        required: true
      folder_id:
        description: 'Folder ID'
        required: true
      cat_name:
        description: 'Cat Name'
        required: true
      image_id:
        description: 'Image ID'
        required: false
      copy_id:
        description: 'Copy ID'
        required: true
      text_responses:
        description: 'Text Responses JSON'
        required: true
      to_email:
        description: 'To Email'
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib Pillow

    - name: Run script
      env:
        # GASの inputs から送られてくるデータを環境変数としてPythonに渡す
        TEMPLATE_ID: ${{ github.event.inputs.template_id }}
        FOLDER_ID: ${{ github.event.inputs.folder_id }}
        CAT_NAME: ${{ github.event.inputs.cat_name }}
        IMAGE_ID: ${{ github.event.inputs.image_id }}
        COPY_ID: ${{ github.event.inputs.copy_id }}
        TO_EMAIL: ${{ github.event.inputs.to_email }}
        TEXT_RESPONSES: ${{ github.event.inputs.text_responses }}
        # Google APIの認証情報をSecretsから読み込む
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: python main.py
